<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="朝日カレンダー">
  <title>朝日カレンダー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #F8F6FF; min-height: 100vh; min-height: -webkit-fill-available; }
    #app { padding: 16px; max-width: 800px; margin: 0 auto; padding-bottom: 40px; }

    .header { text-align: center; margin-bottom: 16px; }
    .header-sub { font-size: 13px; color: #9B8EC4; letter-spacing: 3px; margin-bottom: 6px; }
    .header-nav { display: flex; align-items: center; justify-content: center; gap: 20px; }
    .nav-btn { width: 40px; height: 40px; border-radius: 50%; background: #EDE8FF; border: none; font-size: 22px; color: #7B5DD6; cursor: pointer; font-weight: 700; }
    .month-label { font-size: 26px; font-weight: 700; color: #3D2D6B; }

    .sync-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; font-size: 12px; color: #9B8EC4; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #CCC; flex-shrink: 0; }
    .sync-dot.ok { background: #5BAD6F; }
    .sync-dot.error { background: #E07B8A; }
    .sync-dot.loading { background: #F0A030; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .sync-btn { background: #EDE8FF; border: none; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #7B5DD6; cursor: pointer; font-family: inherit; font-weight: 600; }

    .filter-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    .chip { border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid; transition: all 0.15s; font-family: inherit; }

    .cal-wrap { background: #fff; border-radius: 20px; box-shadow: 0 4px 24px rgba(100,80,180,0.10); overflow: hidden; width: 100%; table-layout: fixed; }
    .weekdays { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); background: #EDE8FF; }
    .weekday { text-align: center; padding: 10px 0; font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; min-width: 0; box-sizing: border-box; }
    .days { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
    .day-cell { height: 80px; min-width: 0; padding: 5px 4px 4px 6px; border-bottom: 1px solid #F0EDF8; border-right: 1px solid #F0EDF8; cursor: pointer; transition: background 0.12s; overflow: hidden; box-sizing: border-box; }
    .day-cell:active { background: #EDE8FF !important; }
    .day-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; margin-bottom: 2px; flex-shrink: 0; }
    .dots { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 2px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .event-pill { font-size: 10px; border-radius: 6px; padding: 1px 4px; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; border: 1px solid; display: flex; align-items: center; gap: 2px; max-width: 100%; min-width: 0; box-sizing: border-box; }
    .more { font-size: 11px; color: #9B8EC4; }

    .legend { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #5A4A8A; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* 画像エリア */
    .photo-section { margin-top: 24px; }
    .photo-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .photo-section-title { font-size: 13px; font-weight: 700; color: #9B8EC4; letter-spacing: 2px; }
    .photo-section-count { font-size: 12px; color: #C4B8F0; }
    .photo-upload-btn { background: #EDE8FF; border: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; color: #7B5DD6; cursor: pointer; font-weight: 600; font-family: inherit; }
    .photo-upload-btn:disabled { background: #F0EDF8; color: #C4B8F0; cursor: default; }
    .photo-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .photo-item { position: relative; border-radius: 12px; overflow: hidden; background: #F0EDF8; aspect-ratio: 4/3; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
    .photo-delete-btn { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 50%; background: rgba(60,40,120,0.7); border: none; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .photo-empty { border: 2px dashed #C4B8F0; border-radius: 16px; padding: 32px; text-align: center; color: #C4B8F0; }
    .photo-uploading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; background: #FAF8FF; border-radius: 12px; font-size: 13px; color: #7B5DD6; }
    .photo-spinner { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* アップロード選択モーダル */
    .upload-choice-modal { background: #fff; border-radius: 20px; padding: 22px; width: 100%; max-width: 340px; box-shadow: 0 8px 40px rgba(100,80,180,0.2); }
    .upload-choice-btn { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid #EDE8FF; background: #FAF8FF; font-size: 16px; font-weight: 600; color: #3D2D6B; cursor: pointer; font-family: inherit; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .upload-choice-btn:active { background: #EDE8FF; }

    /* 画像拡大モーダル */
    .img-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 300; padding: 16px; }
    .img-viewer img { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    .img-viewer-close { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 22px; cursor: pointer; }

    /* 予定モーダル */
    .overlay { position: fixed; inset: 0; background: rgba(60,40,120,0.38); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal { background: #fff; border-radius: 20px; padding: 22px; width: 100%; max-width: 440px; box-shadow: 0 8px 40px rgba(100,80,180,0.2); max-height: 90vh; overflow-y: auto; }
    .modal-title { font-weight: 700; font-size: 17px; color: #3D2D6B; margin-bottom: 14px; }
    .modal-date { font-size: 12px; color: #9B8EC4; margin-left: 8px; }
    label { font-size: 12px; color: #9B8EC4; font-weight: 700; display: block; margin-bottom: 5px; }
    input[type=text] { width: 100%; padding: 11px 13px; border-radius: 10px; border: 2px solid #EDE8FF; font-size: 15px; color: #3D2D6B; outline: none; margin-bottom: 14px; font-family: inherit; }
    input[type=text]:focus { border-color: #7B5DD6; }
    .member-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .emoji-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .emoji-btn { width: 40px; height: 40px; border-radius: 10px; font-size: 20px; background: #F8F6FF; border: 2px solid transparent; cursor: pointer; }
    .emoji-btn.selected { background: #EDE8FF; border-color: #7B5DD6; }
    .btn-row { display: flex; gap: 8px; margin-top: 18px; }
    .btn { padding: 12px 0; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; flex: 1; }
    .btn-cancel { background: #F0EDF8; color: #7B5DD6; }
    .btn-delete { background: #FFE8EC; color: #E07B8A; }
    .btn-save { background: #7B5DD6; color: #fff; flex: 2; }
    .btn-save:disabled { background: #CCC; cursor: default; }
    .hidden { display: none; }

    /* パスワード画面 */
    .pw-screen { position: fixed; inset: 0; background: #F8F6FF; display: flex; align-items: center; justify-content: center; z-index: 999; padding: 32px; }
    .pw-box { background: #fff; border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 340px; box-shadow: 0 8px 40px rgba(100,80,180,0.15); text-align: center; }
    .pw-title { font-size: 28px; margin-bottom: 8px; }
    .pw-subtitle { font-size: 14px; color: #9B8EC4; margin-bottom: 28px; }
    .pw-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 28px; }
    .pw-dot { width: 14px; height: 14px; border-radius: 50%; background: #EDE8FF; transition: background 0.15s; }
    .pw-dot.filled { background: #7B5DD6; }
    .pw-numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .pw-btn { background: #F8F6FF; border: none; border-radius: 16px; padding: 18px; font-size: 22px; font-weight: 700; color: #3D2D6B; cursor: pointer; font-family: inherit; transition: background 0.1s; }
    .pw-btn:active { background: #EDE8FF; }
    .pw-btn.del { font-size: 18px; color: #9B8EC4; }
    .pw-error { font-size: 13px; color: #E07B8A; margin-top: 12px; min-height: 20px; }

    /* 予定一覧 */
    .event-list-section { margin-top: 24px; }
    .event-list-title { font-size: 13px; font-weight: 700; color: #9B8EC4; letter-spacing: 2px; margin-bottom: 10px; }
    .event-list-empty { text-align: center; color: #C4B8F0; font-size: 13px; padding: 20px; background: #fff; border-radius: 16px; }
    .event-list-item { display: flex; align-items: center; gap: 10px; background: #fff; border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 2px 8px rgba(100,80,180,0.07); cursor: pointer; }
    .event-list-item:active { background: #F8F6FF; }
    .event-list-date { font-size: 13px; font-weight: 700; color: #7B5DD6; min-width: 36px; text-align: center; }
    .event-list-date-day { font-size: 18px; font-weight: 800; line-height: 1; }
    .event-list-date-dow { font-size: 10px; color: #9B8EC4; }
    .event-list-body { flex: 1; min-width: 0; }
    .event-list-name { font-size: 14px; font-weight: 600; color: #3D2D6B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-list-members { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
    .event-list-tag { font-size: 11px; border-radius: 10px; padding: 1px 8px; font-weight: 600; }
    .event-list-emoji { font-size: 20px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #3D2D6B; color: #fff; border-radius: 20px; padding: 10px 20px; font-size: 13px; z-index: 400; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<!-- パスワード画面 -->
<div class="pw-screen" id="pwScreen">
  <div class="pw-box">
    <div class="pw-title">🔒 朝日カレンダー</div>
    <div class="pw-subtitle">パスワードを入力してください</div>
    <div class="pw-dots" id="pwDots">
      <div class="pw-dot" id="dot0"></div>
      <div class="pw-dot" id="dot1"></div>
      <div class="pw-dot" id="dot2"></div>
      <div class="pw-dot" id="dot3"></div>
      <div class="pw-dot" id="dot4"></div>
      <div class="pw-dot" id="dot5"></div>
    </div>
    <div class="pw-numpad">
      <button class="pw-btn" onclick="pwInput('1')">1</button>
      <button class="pw-btn" onclick="pwInput('2')">2</button>
      <button class="pw-btn" onclick="pwInput('3')">3</button>
      <button class="pw-btn" onclick="pwInput('4')">4</button>
      <button class="pw-btn" onclick="pwInput('5')">5</button>
      <button class="pw-btn" onclick="pwInput('6')">6</button>
      <button class="pw-btn" onclick="pwInput('7')">7</button>
      <button class="pw-btn" onclick="pwInput('8')">8</button>
      <button class="pw-btn" onclick="pwInput('9')">9</button>
      <button class="pw-btn" onclick="pwInput('0')" style="grid-column:2">0</button>
      <button class="pw-btn del" onclick="pwDelete()">⌫</button>
    </div>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="header">
    <div style="position:relative">
      <div class="header-sub">朝日カレンダー</div>
      <span style="position:absolute;top:0;right:0;font-size:10px;color:#C4B8F0;font-weight:500">v1.5.0</span>
    </div>
    <div class="header-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">読み込み中...</span>
    <button class="sync-btn" onclick="syncFromSheet()">🔄 同期</button>
  </div>

  <!-- トークン未設定時の警告 -->
  <div id="tokenWarning" class="hidden" style="background:#FEF3E2;border:1px solid #F0A030;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:13px;color:#7A4F00">
    <span style="font-size:20px">⚠️</span>
    <div style="flex:1">画像アップロードにGitHubトークンが必要です</div>
    <button onclick="openTokenModal()" style="background:#F0A030;border:none;border-radius:20px;padding:5px 12px;font-size:12px;color:#fff;cursor:pointer;font-weight:700;font-family:inherit">設定</button>
  </div>

  <div class="filter-row" id="filterRow"></div>
  <div class="cal-wrap">
    <div class="weekdays" id="weekdays"></div>
    <div class="days" id="daysGrid"></div>
  </div>
  <div class="legend" id="legend"></div>

  <!-- 予定一覧 -->
  <div class="event-list-section">
    <div class="event-list-title">📅 今月の予定一覧</div>
    <div id="eventList"></div>
  </div>

  <!-- 画像エリア -->
  <div class="photo-section">
    <div class="photo-section-header">
      <div>
        <div class="photo-section-title">📋 画像</div>
        <div class="photo-section-count" id="photoCount"></div>
      </div>
      <button class="photo-upload-btn" id="photoUploadBtn" onclick="openUploadChoice()">＋ 追加</button>
    </div>
    <div id="photoUploading" class="photo-uploading hidden">
      <span class="photo-spinner">⏳</span> アップロード中...
    </div>
    <div id="photoGrid" class="photo-grid"></div>
    <div id="photoEmpty" class="photo-empty hidden">
      <div style="font-size:32px;margin-bottom:8px">🖼️</div>
      <div style="font-size:13px">画像をアップロードしてください</div>
    </div>
  </div>
</div>
</div>

<!-- 予定モーダル -->
<div class="overlay hidden" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle"></div>
    <label>日付</label>
    <input type="date" id="formDate" style="width:100%;padding:11px 13px;border-radius:10px;border:2px solid #EDE8FF;font-size:15px;color:#3D2D6B;outline:none;margin-bottom:14px;font-family:inherit;">
    <label>タイトル</label>
    <input type="text" id="formTitle" placeholder="例：参観日、歯医者...">
    <label>だれの予定？</label>
    <div class="member-row" id="formMembers"></div>
    <label>アイコン</label>
    <div class="emoji-row" id="formEmojis"></div>
    <label>メモ（任意）</label>
    <input type="text" id="formNote" placeholder="メモを入力...">
    <div class="btn-row">
      <button class="btn btn-delete hidden" id="btnDelete" onclick="deleteEvent()">🗑️ 削除</button>
      <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-save" id="btnSave" onclick="saveEvent()">追加する</button>
    </div>
  </div>
</div>

<!-- アップロード選択モーダル -->
<div class="overlay hidden" id="uploadChoiceOverlay" onclick="if(event.target.id==='uploadChoiceOverlay')closeUploadChoice()">
  <div class="upload-choice-modal" onclick="event.stopPropagation()">
    <div class="modal-title">📷 画像を追加</div>
    <button class="upload-choice-btn" onclick="triggerUpload('camera')">
      <span style="font-size:24px">📷</span>
      <div><div style="font-size:15px">カメラで撮影</div><div style="font-size:12px;color:#9B8EC4;font-weight:400">その場で撮影して追加</div></div>
    </button>
    <button class="upload-choice-btn" onclick="triggerUpload('file')">
      <span style="font-size:24px">🖼️</span>
      <div><div style="font-size:15px">ファイルから選ぶ</div><div style="font-size:12px;color:#9B8EC4;font-weight:400">カメラロール・ファイルアプリから</div></div>
    </button>
    <button class="btn btn-cancel" style="width:100%;padding:12px;margin-top:4px" onclick="closeUploadChoice()">キャンセル</button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="onPhotoFileSelected(event)">
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="onPhotoFileSelected(event)">
  </div>
</div>

<!-- 画像拡大ビュー -->
<div class="img-viewer hidden" id="imgViewer" onclick="closeImgViewer()">
  <button class="img-viewer-close" onclick="closeImgViewer()">✕</button>
  <img id="imgViewerImg" src="" onclick="event.stopPropagation()">
</div>

<!-- トークン設定モーダル -->
<div class="overlay hidden" id="tokenOverlay" onclick="if(event.target.id==='tokenOverlay')closeTokenModal()">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:400px">
    <div class="modal-title">🔑 GitHubトークン設定</div>
    <p style="font-size:13px;color:#9B8EC4;margin-bottom:14px">画像のアップロードに必要です。一度設定すればこのデバイスに保存されます。</p>
    <label>Personal Access Token</label>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx" style="width:100%;padding:11px 13px;border-radius:10px;border:2px solid #EDE8FF;font-size:14px;color:#3D2D6B;outline:none;margin-bottom:14px;font-family:inherit">
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeTokenModal()">キャンセル</button>
      <button class="btn btn-save" onclick="saveToken()">保存する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 不審アクセス警告モーダル -->
<div class="overlay hidden" id="alertOverlay">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:380px;text-align:center">
    <div style="font-size:48px;margin-bottom:12px">⚠️</div>
    <div class="modal-title" style="text-align:center">見慣れない端末からのアクセス</div>
    <p style="font-size:13px;color:#9B8EC4;margin-bottom:8px">このデバイスから朝日カレンダーへのアクセスは初めてです。</p>
    <div id="alertDetail" style="font-size:12px;color:#C4B8F0;background:#F8F6FF;border-radius:10px;padding:12px;margin-bottom:20px;text-align:left;line-height:1.8"></div>
    <div class="btn-row">
      <button class="btn btn-delete" onclick="closeAlertModal()">不審なアクセス</button>
      <button class="btn btn-save" onclick="closeAlertModal()">自分のアクセス</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxkRwhjFUhgMfsGIbChTsQ9LZa8Mvd7oGyrPbJD5auJjz8JQoLgJGh5m-Mn7xj9unNq8Q/exec";
const GH_USER = "shifaff-coder";
const GH_REPO = "family-calendar";
const GH_BRANCH = "main";
const GH_TOKEN_KEY = "gh_token_family_cal";
function getGHToken() {
  return localStorage.getItem(GH_TOKEN_KEY) || "";
}

const MEMBERS = [
  { id: "papa",  label: "パパ",  emoji: "👨", color: "#4A90D9", light: "#E8F3FC" },
  { id: "mama",  label: "ママ",  emoji: "👩", color: "#E07B8A", light: "#FCE8EB" },
  { id: "mari",  label: "まり",  emoji: "🎒", color: "#5BAD6F", light: "#E8F5EB" },
  { id: "aki",   label: "あき",  emoji: "🌸", color: "#F0A030", light: "#FEF3E2" },
  { id: "hiro",  label: "ひろ",  emoji: "⭐", color: "#9B6DD6", light: "#F2ECFC" },
  { id: "iku",   label: "いく",  emoji: "🌟", color: "#E05C9B", light: "#FCE8F3" },
];
const CATEGORY_EMOJIS = ["📅","🏫","🏥","🎉","🚗","⚽","🎵","🍱","🛒","✈️"];
const WEEKDAYS = ["日","月","火","水","木","金","土"];
const MONTHS_JP = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const LOCAL_KEY = "family-calendar-v4";

let state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  events: [],
  filterMember: null,
  images: [],
  modal: { open: false, editId: null, date: null, title: "", memberIds: [], emoji: "📅", note: "" }
};

function currentYearMonth() {
  return state.year + "-" + String(state.month + 1).padStart(2, "0");
}

// ── ローカル保存 ──
function loadLocal() {
  try { return JSON.parse(localStorage.getItem(LOCAL_KEY) || "[]"); } catch { return []; }
}
function saveLocal() {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(state.events)); } catch {}
}

// ── Toast ──
function showToast(msg, duration = 2500) {

// ── 同期ステータス ──
function setSyncStatus(status, text) {
  document.getElementById("syncDot").className = "sync-dot " + status;
  document.getElementById("syncText").textContent = text;
}

function nowStr() {
  const n = new Date();
  return n.getHours() + ":" + String(n.getMinutes()).padStart(2, "0");
}

// ── スプレッドシートから読み込み ──
async function syncFromSheet() {
  setSyncStatus("loading", "同期中...");
  try {
    const res = await fetch(GAS_URL + "?action=getEvents&t=" + Date.now(), { redirect: "follow" });
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.status === "ok") {
      state.events = (data.events || []).map(ev => {
        // 日付を正規化 "2026-06-14T15:00:00.000Z" → 日本時間で "2026-06-15" にならないよう修正
        let date = ev.date || "";
        if (date.includes("T")) {
          // UTCのISO文字列を日本時間(+9)に変換して日付部分だけ取得
          const d = new Date(date);
          const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
          date = jst.toISOString().substring(0, 10);
        } else {
          date = date.substring(0, 10);
        }
        // memberIdsを正規化
        let memberIds = ev.memberIds;
        if (!Array.isArray(memberIds)) {
          try { memberIds = JSON.parse(memberIds); } catch { memberIds = []; }
        }
        return { ...ev, date, memberIds };
      });
      saveLocal();
      renderAll();
      setSyncStatus("ok", "同期済み " + nowStr());
      showToast("✅ 同期しました（" + state.events.length + "件）");
    } else {
      throw new Error(data.message || "エラー");
    }
  } catch (err) {
    setSyncStatus("error", "同期エラー");
    showToast("⚠️ 同期に失敗しました");
    console.error(err);
  }
}

// ── スプレッドシートへ保存 ──
async function saveToSheet() {
  setSyncStatus("loading", "保存中...");
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "saveEvents", events: state.events }),
    });
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.status === "ok") {
      saveLocal();
      setSyncStatus("ok", "保存済み " + nowStr());
      showToast("💾 保存しました");
    } else {
      throw new Error(data.message || "エラー");
    }
  } catch (err) {
    setSyncStatus("error", "保存エラー");
    showToast("⚠️ 保存に失敗しました");
    console.error(err);
  }
}

function renderEventList() {
  const { year, month } = state;
  const prefix = year + "-" + String(month + 1).padStart(2, "0") + "-";
  const WEEKDAYS_SHORT = ["日","月","火","水","木","金","土"];

  // その月の予定を日付順で取得（フィルター適用）
  let monthEvents = state.events
    .filter(e => e.date.startsWith(prefix) && (!state.filterMember || e.memberIds.includes(state.filterMember)))

    container.innerHTML = '<div class="event-list-empty">予定はありません</div>';

  }

  container.innerHTML = monthEvents.map(ev => {
    const d = parseInt(ev.date.split("-")[2]);

    const dowColor = dow === 0 ? "#E07B8A" : dow === 6 ? "#4A90D9" : "#9B8EC4";
    const members = ev.memberIds.map(id => MEMBERS.find(m => m.id === id)).filter(Boolean);

      '<span class="event-list-tag" style="background:' + m.light + ';color:' + m.color + '">' + m.emoji + m.label + '</span>'

      '</div>' +

        '<div class="event-list-name">' + esc(ev.title) + (ev.note ? ' <span style="font-size:11px;color:#9B8EC4">— ' + esc(ev.note) + '</span>' : '') + '</div>' +

function renderCalendar() {
  const { year, month } = state;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const today = new Date();

  document.getElementById("weekdays").innerHTML = WEEKDAYS.map((d, i) =>
    '<div class="weekday" style="color:' + (i===0?"#E07B8A":i===6?"#4A90D9":"#5A4A8A") + '">' + d + '</div>'
  ).join("");

  let html = "";
  for (let i = 0; i < firstDay; i++) html += '<div class="day-cell" style="cursor:default"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = year + "-" + String(month+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    const dow = (firstDay + d - 1) % 7;
    const isToday = d===today.getDate() && month===today.getMonth() && year===today.getFullYear();
    const dayEvents = getEventsForDate(dateStr);
    const allEvents = state.events.filter(e => e.date===dateStr);
    const memberSet = new Set(allEvents.flatMap(e => e.memberIds));
    const dotColors = [...memberSet].map(id => MEMBERS.find(m=>m.id===id)?.color).filter(Boolean);

    let inner = "";
    if (!state.filterMember && dotColors.length > 0) {
      inner += '<div class="dots">' + dotColors.slice(0,5).map(c=>'<div class="dot" style="background:'+c+'"></div>').join("") + '</div>';
    }
    dayEvents.slice(0,2).forEach(ev => {
      const mem = MEMBERS.find(m=>m.id===ev.memberIds[0]);
      inner += '<div class="event-pill" style="background:' + (mem?.light||"#F0EDF8") + ';color:' + (mem?.color||"#5A4A8A") + ';border-color:' + (mem?.color||"#CCC") + '44" onclick="openEdit(\'' + ev.id + '\',event)"><span>' + ev.categoryEmoji + '</span><span style="overflow:hidden;text-overflow:ellipsis">' + esc(ev.title) + '</span></div>';
    });
    if (dayEvents.length > 2) inner += '<div class="more">+' + (dayEvents.length-2) + '件</div>';

    html += '<div class="day-cell" style="background:' + (isToday?"#F0EEFF":"transparent") + '" onclick="openAdd(\'' + dateStr + '\')">' +
      '<div class="day-num" style="background:' + (isToday?"#7B5DD6":"transparent") + ';color:' + (isToday?"#fff":dow===0?"#E07B8A":dow===6?"#4A90D9":"#3D2D6B") + ';font-weight:' + (isToday?800:500) + '">' + d + '</div>' +
      inner + '</div>';
  }
  document.getElementById("daysGrid").innerHTML = html;
}

function getEventsForDate(dateStr) {
  return state.events.filter(e => e.date===dateStr && (!state.filterMember || (e.memberIds && e.memberIds.includes(state.filterMember))));
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

async function uploadImage(file) {
  if (state.images.length >= 10) { showToast("この月は最大10枚までです"); return; }

  document.getElementById("photoUploading").classList.remove("hidden");
  document.getElementById("photoUploadBtn").disabled = true;

  try {
    const base64 = await fileToBase64(file);
    const id = Date.now().toString() + Math.floor(Math.random()*1000);
    const ym = currentYearMonth();
    const path = "images/" + ym + "/" + id + ".jpg";
    const apiUrl = "https://api.github.com/repos/" + GH_USER + "/" + GH_REPO + "/contents/" + path;

    const res = await fetch(apiUrl, {
      method: "PUT",
      headers: {
        "Authorization": "token " + getGHToken(),
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        message: "Add image " + id,
        content: base64,
        branch: GH_BRANCH,
      }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message || "GitHub upload failed");

    const rawUrl = "https://raw.githubusercontent.com/" + GH_USER + "/" + GH_REPO + "/" + GH_BRANCH + "/" + path;

    // GASのスプレッドシートにURLを保存
    const saveRes = await fetch(GAS_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain" },

        action: "saveImage",

        filename: id + ".jpg",
        url: rawUrl,
      }),
    });
    const saveText = await saveRes.text();
    const saveData = JSON.parse(saveText);
    if (saveData.status !== "ok") throw new Error(saveData.message || "保存失敗");

    await loadImages();
    showToast("🖼️ 画像をアップロードしました");
  } catch(err) {
    showToast("⚠️ " + err.message);

    document.getElementById("photoUploadBtn").disabled = state.images.length >= 10;

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = ev => {
      img.onload = () => {
        // 最大800pxに縮小、JPEG品質0.5で強圧縮（スプレッドシートセル制限対策）
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        // まず品質0.5で試す
        let dataUrl = canvas.toDataURL("image/jpeg", 0.5);
        // それでも大きければさらに縮小
        if (dataUrl.length > 200000) {
          canvas.width = Math.round(w * 0.6);
          canvas.height = Math.round(h * 0.6);
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          dataUrl = canvas.toDataURL("image/jpeg", 0.4);
        }
        resolve(dataUrl.split(",")[1]);
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── パスワード管理 ──
const PW_CORRECT = "230230";
const PW_KEY = "family_cal_auth";
const PW_FAIL_KEY = "family_cal_fails";
let pwCurrent = "";
let pwLocked = false;
let pwLockTimer = null;

function checkAuth() {
  try {
    const saved = JSON.parse(localStorage.getItem(PW_KEY) || "{}");
    const now = new Date();
    if (saved.expiry && new Date(saved.expiry) > now) {
      unlockApp(false);
      return;
    }
  } catch {}
  document.getElementById("pwScreen").style.display = "flex";
  document.getElementById("app").classList.add("hidden");
  checkLockStatus();
}

function checkLockStatus() {
  try {
    const fails = JSON.parse(localStorage.getItem(PW_FAIL_KEY) || "{}");
    const now = Date.now();
    if (fails.lockUntil && fails.lockUntil > now) {
      startLockCountdown(fails.lockUntil, fails.count);
    }
  } catch {}
}

function startLockCountdown(lockUntil, failCount) {
  pwLocked = true;
  setNumpadEnabled(false);
  const lockMin = failCount >= 10 ? 60 : 0.5;
  const update = () => {
    const remaining = Math.ceil((lockUntil - Date.now()) / 1000);
    if (remaining <= 0) {
      pwLocked = false;
      setNumpadEnabled(true);
      document.getElementById("pwError").textContent = "";
      if (pwLockTimer) clearInterval(pwLockTimer);
      return;
    }
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    document.getElementById("pwError").textContent =
      m > 0 ? m + "分" + s + "秒後に再試行できます" : s + "秒後に再試行できます";
  };
  update();
  pwLockTimer = setInterval(update, 1000);
}

function setNumpadEnabled(enabled) {
  document.querySelectorAll(".pw-btn").forEach(btn => {
    btn.disabled = !enabled;
    btn.style.opacity = enabled ? "1" : "0.3";
  });
}

function unlockApp(isNew) {
  document.getElementById("pwScreen").style.display = "none";
  document.getElementById("app").classList.remove("hidden");
  const now = new Date();
  const expiry = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  localStorage.setItem(PW_KEY, JSON.stringify({ expiry: expiry.toISOString() }));
  localStorage.removeItem(PW_FAIL_KEY);
  // アクセスログを送信（パスワード入力成功時のみisNew=true）
  sendAccessLog(isNew || false);
}

function pwInput(num) {
  if (pwLocked || pwCurrent.length >= 6) return;
  pwCurrent += num;
  updatePwDots();
  if (pwCurrent.length === 6) {
    setTimeout(checkPw, 200);
  }
}

function pwDelete() {
  if (pwLocked) return;
  pwCurrent = pwCurrent.slice(0, -1);
  updatePwDots();
  document.getElementById("pwError").textContent = "";
}

function updatePwDots() {
  for (let i = 0; i < 6; i++) {
    const dot = document.getElementById("dot" + i);
    dot.classList.toggle("filled", i < pwCurrent.length);
  }
}

function checkPw() {
  if (pwCurrent === PW_CORRECT) {
    unlockApp(true);
  } else {
    // 失敗カウント更新
    let fails = {};
    try { fails = JSON.parse(localStorage.getItem(PW_FAIL_KEY) || "{}"); } catch {}
    fails.count = (fails.count || 0) + 1;

    let lockSec = 0;
    if (fails.count >= 10) {
      lockSec = 60 * 60; // 1時間
    } else if (fails.count >= 5) {
      lockSec = 30; // 30秒
    }

    if (lockSec > 0) {
      fails.lockUntil = Date.now() + lockSec * 1000;
      localStorage.setItem(PW_FAIL_KEY, JSON.stringify(fails));
      document.querySelectorAll(".pw-dot").forEach(d => d.style.background = "#E07B8A");
      setTimeout(() => {
        pwCurrent = "";
        updatePwDots();
        document.querySelectorAll(".pw-dot").forEach(d => d.style.background = "");
        startLockCountdown(fails.lockUntil, fails.count);
      }, 600);
    } else {
      localStorage.setItem(PW_FAIL_KEY, JSON.stringify(fails));
      const remaining = 5 - fails.count;
      document.getElementById("pwError").textContent =
        remaining > 0 ? "パスワードが違います（あと" + remaining + "回で一時ロック）" : "パスワードが違います";
      document.querySelectorAll(".pw-dot").forEach(d => d.style.background = "#E07B8A");
      setTimeout(() => {
        pwCurrent = "";
        updatePwDots();
        document.querySelectorAll(".pw-dot").forEach(d => d.style.background = "");
      }, 600);
    }
  }
}

// ── アクセスログ ──
const DEVICE_ID_KEY = "family_cal_device_id";

function getOrCreateDeviceId() {
  let id = localStorage.getItem(DEVICE_ID_KEY);
  if (!id) {
    id = "dev_" + Date.now() + "_" + Math.random().toString(36).substr(2, 8);
    localStorage.setItem(DEVICE_ID_KEY, id);
  }
  return id;
}

async function sendAccessLog(isNew) {
  try {
    const deviceId = getOrCreateDeviceId();
    const ua = navigator.userAgent;
    const screen = window.screen.width + "x" + window.screen.height;
    const language = navigator.language;

    const res = await fetch(GAS_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        action: "accessLog",
        deviceId,
        userAgent: ua,
        screen,
        language,
        isNew,
      }),
    });
    const text = await res.text();
    const data = JSON.parse(text);

    // 初回アクセスの場合は警告表示
    if (isNew && !data.isKnownDevice) {
      showAccessAlert(ua, screen, language);
    }
  } catch(err) {
    console.error("accessLog error:", err);
  }
}

function showAccessAlert(ua, screen, language) {
  // ブラウザ判定
  let browser = "不明";
  if (ua.includes("CriOS")) browser = "Chrome (iPhone)";
  else if (ua.includes("FxiOS")) browser = "Firefox (iPhone)";
  else if (ua.includes("Safari") && ua.includes("Mobile")) browser = "Safari (iPhone)";
  else if (ua.includes("Safari")) browser = "Safari";
  else if (ua.includes("Chrome")) browser = "Chrome";

  document.getElementById("alertDetail").innerHTML =
    "📱 ブラウザ：" + browser + "<br>" +
    "🖥️ 画面サイズ：" + screen + "<br>" +
    "🌐 言語設定：" + language + "<br>" +
    "🕐 日時：" + new Date().toLocaleString("ja-JP");

  document.getElementById("alertOverlay").classList.remove("hidden");
}

function closeAlertModal() {
  document.getElementById("alertOverlay").classList.add("hidden");
}

// ── トークン管理 ──
function checkToken() {
  const token = getGHToken();
  const warning = document.getElementById("tokenWarning");
  if (!token) {
    warning.classList.remove("hidden");
    warning.style.display = "flex";
  } else {
    warning.classList.add("hidden");
    warning.style.display = "none";
  }
}
function openTokenModal() {
  document.getElementById("tokenInput").value = getGHToken();
  document.getElementById("tokenOverlay").classList.remove("hidden");
}
function closeTokenModal() {
  document.getElementById("tokenOverlay").classList.add("hidden");
}
function saveToken() {
  const token = document.getElementById("tokenInput").value.trim();
  if (!token) { alert("トークンを入力してください"); return; }
  localStorage.setItem(GH_TOKEN_KEY, token);
  closeTokenModal();
  checkToken();
  showToast("🔑 トークンを保存しました");
}
